name: build

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Create Executable
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: "3.12"
          spec: "qbtrf.spec"
          requirements: "requirements.txt"
          upload_exe_with_name: "qbtrf"
          options: --onefile
